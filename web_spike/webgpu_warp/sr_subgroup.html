<!doctype html>
<meta charset="utf-8"><title>playhd — on-GPU compact SR with the SUBGROUP conv (Chrome, authoritative)</title>
<style>body{font:13px monospace;background:#111;color:#ddd;margin:16px}canvas{border:1px solid #333;image-rendering:pixelated;max-width:46%}#log{white-space:pre-wrap}.ok{color:#6f6}.err{color:#f66}.hd{color:#9cf}.row{display:flex;gap:12px}</style>
<h3 class="hd">playhd — compact SR with the subgroup weight-broadcast conv (Chrome) — timing + parity vs PyTorch</h3>
<div class="row"><div><div>WebGPU SR (wtile)</div><canvas id="gpu"></canvas></div><div><div>PyTorch reference</div><canvas id="ref"></canvas></div></div>
<div id="log"></div>
<script type="module">
const L=(m,c="")=>{const d=document.getElementById("log");d.innerHTML+=`<span class="${c}">${m}</span>\n`;console.log(m);};
const R={};window.__w=R;
const imgData=async(u,w,h)=>{const b=await createImageBitmap(await (await fetch(u)).blob());const c=new OffscreenCanvas(w,h);const x=c.getContext("2d");x.drawImage(b,0,0);return x.getImageData(0,0,w,h).data;};
async function main(){
  const adapter=await navigator.gpu.requestAdapter();
  const ts=adapter.features.has("timestamp-query");
  const dev=await adapter.requestDevice({requiredFeatures: ts?["timestamp-query","subgroups"]:["subgroups"], requiredLimits:{maxComputeWorkgroupStorageSize:Math.min(32768,adapter.limits.maxComputeWorkgroupStorageSize)}});
  const meta=await (await fetch("../compact_data/layers.json")).json();const {layers,upscale,H,W,n_passes}=meta;const HD=H*upscale,WD=W*upscale,plane=H*W,FC=64;
  const wf=new Float32Array(await (await fetch("../compact_data/weights.bin")).arrayBuffer());
  const Wg=dev.createBuffer({size:wf.byteLength,usage:GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST});dev.queue.writeBuffer(Wg,0,wf);
  const A=dev.createBuffer({size:FC*plane*4,usage:GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST|GPUBufferUsage.COPY_SRC});
  const B=dev.createBuffer({size:FC*plane*4,usage:GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_SRC|GPUBufferUsage.COPY_DST});
  const px=await imgData("../compact_data/lr.png",W,H);const Ai=new Float32Array(FC*plane);
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){const o=(y*W+x)*4;for(let c=0;c<3;c++)Ai[c*plane+y*W+x]=px[o+c]/255;}
  dev.queue.writeBuffer(A,0,Ai);
  const convCode=await (await fetch("subgroup.wgsl")).text();
  const conv=dev.createShaderModule({code:convCode});
  const pipe=dev.createComputePipeline({layout:"auto",compute:{module:conv,entryPoint:"main"}});
  const TW=16,TH=16,OCB=64;
  let inb=A,outb=B;const passes=[];
  for(const ly of layers){const u=new Uint32Array([H,W,ly.in_c,ly.out_c,ly.w_off,ly.b_off,ly.prelu_off<0?0:ly.prelu_off,ly.prelu_off<0?0:1]);
    const ub=dev.createBuffer({size:32,usage:GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST});dev.queue.writeBuffer(ub,0,u);
    passes.push({bg:dev.createBindGroup({layout:pipe.getBindGroupLayout(0),entries:[{binding:0,resource:{buffer:inb}},{binding:1,resource:{buffer:outb}},{binding:2,resource:{buffer:Wg}},{binding:3,resource:{buffer:ub}}]}),gz:Math.ceil(ly.out_c/OCB)});[inb,outb]=[outb,inb];}
  const featLast=inb;
  // pixelshuffle + residual -> out texture (same as sr.html)
  const out=dev.createTexture({size:[WD,HD],format:"rgba8unorm",usage:GPUTextureUsage.RENDER_ATTACHMENT|GPUTextureUsage.COPY_SRC|GPUTextureUsage.TEXTURE_BINDING});
  const psh=dev.createShaderModule({code:`struct P{H:u32,W:u32,up:u32,_p:u32};@group(0)@binding(0) var<storage,read> feat:array<f32>;@group(0)@binding(1) var<storage,read> lr:array<f32>;@group(0)@binding(2) var<uniform> u:P;
    @vertex fn vs(@builtin(vertex_index) i:u32)->@builtin(position) vec4f{var p=array<vec2f,3>(vec2f(-1,-1),vec2f(3,-1),vec2f(-1,3));return vec4f(p[i],0,1);}
    @fragment fn fs(@builtin(position) pos:vec4f)->@location(0) vec4f{let X=i32(floor(pos.x));let Y=i32(floor(pos.y));let up=i32(u.up);let x=X/up;let y=Y/up;let i=Y%up;let j=X%up;let pl=u.H*u.W;
      var rgb=vec3f(0.0);for(var c=0;c<3;c=c+1){let ch=u32(c*up*up+i*up+j);rgb[c]=clamp(feat[ch*pl+u32(y)*u.W+u32(x)]+lr[u32(c)*pl+u32(y)*u.W+u32(x)],0.0,1.0);}return vec4f(rgb,1.0);}`});
  const LRb=dev.createBuffer({size:Ai.byteLength,usage:GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST});dev.queue.writeBuffer(LRb,0,Ai);
  const fp=dev.createRenderPipeline({layout:"auto",vertex:{module:psh,entryPoint:"vs"},fragment:{module:psh,entryPoint:"fs",targets:[{format:"rgba8unorm"}]},primitive:{topology:"triangle-list"}});
  const fu=new Uint32Array([H,W,upscale,0]);const fub=dev.createBuffer({size:16,usage:GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST});dev.queue.writeBuffer(fub,0,fu);
  const fbg=dev.createBindGroup({layout:fp.getBindGroupLayout(0),entries:[{binding:0,resource:{buffer:featLast}},{binding:1,resource:{buffer:LRb}},{binding:2,resource:{buffer:fub}}]});
  // timing: timestamp the 34 conv passes (begin pass0 .. end pass33)
  const qs=ts?dev.createQuerySet({type:"timestamp",count:2}):null;
  const qR=ts?dev.createBuffer({size:16,usage:GPUBufferUsage.QUERY_RESOLVE|GPUBufferUsage.COPY_SRC}):null;
  const qRd=ts?dev.createBuffer({size:16,usage:GPUBufferUsage.COPY_DST|GPUBufferUsage.MAP_READ}):null;
  async function convPass(timed){
    dev.queue.writeBuffer(A,0,Ai);
    const enc=dev.createCommandEncoder();
    passes.forEach((p,i)=>{const tsw=timed&&ts?(i===0?{querySet:qs,beginningOfPassWriteIndex:0}:i===passes.length-1?{querySet:qs,endOfPassWriteIndex:1}:undefined):undefined;
      const cp=enc.beginComputePass(tsw?{timestampWrites:tsw}:undefined);cp.setPipeline(pipe);cp.setBindGroup(0,p.bg);cp.dispatchWorkgroups(Math.ceil(W/TW),Math.ceil(H/TH),p.gz);cp.end();});
    if(timed&&ts){enc.resolveQuerySet(qs,0,2,qR,0);enc.copyBufferToBuffer(qR,0,qRd,0,16);}
    dev.queue.submit([enc.finish()]);
    if(timed&&ts){await qRd.mapAsync(GPUMapMode.READ);const t=new BigUint64Array(qRd.getMappedRange().slice(0));qRd.unmap();return Number(t[1]-t[0])/1e6;}
    await dev.queue.onSubmittedWorkDone();return 0;
  }
  await convPass(false);await convPass(false); // warmup
  let convMs=1e9;for(let k=0;k<5;k++){const t=await convPass(true);if(t>0)convMs=Math.min(convMs,t);}
  // final: conv + pixelshuffle -> out, then parity
  await convPass(false);
  const e2=dev.createCommandEncoder();const rp=e2.beginRenderPass({colorAttachments:[{view:out.createView(),loadOp:"clear",storeOp:"store",clearValue:{r:0,g:0,b:0,a:1}}]});rp.setPipeline(fp);rp.setBindGroup(0,fbg);rp.draw(3);rp.end();
  const bpr=Math.ceil(WD*4/256)*256;const rb=dev.createBuffer({size:bpr*HD,usage:GPUBufferUsage.COPY_DST|GPUBufferUsage.MAP_READ});
  e2.copyTextureToBuffer({texture:out},{buffer:rb,bytesPerRow:bpr,rowsPerImage:HD},[WD,HD]);dev.queue.submit([e2.finish()]);await dev.queue.onSubmittedWorkDone();
  // display + parity
  const cv=document.getElementById("gpu");cv.width=WD;cv.height=HD;const ctx=cv.getContext("webgpu");const fmt=navigator.gpu.getPreferredCanvasFormat();ctx.configure({device:dev,format:fmt,alphaMode:"opaque"});
  const blit=dev.createShaderModule({code:`@group(0)@binding(0) var t:texture_2d<f32>;@group(0)@binding(1) var s:sampler;
    @vertex fn vs(@builtin(vertex_index) i:u32)->@builtin(position) vec4f{var p=array<vec2f,3>(vec2f(-1,-1),vec2f(3,-1),vec2f(-1,3));return vec4f(p[i],0,1);}
    @fragment fn fs(@builtin(position) pos:vec4f)->@location(0) vec4f{return textureSampleLevel(t,s,pos.xy/vec2f(${WD}.0,${HD}.0),0.0);}`});
  const bp=dev.createRenderPipeline({layout:"auto",vertex:{module:blit,entryPoint:"vs"},fragment:{module:blit,entryPoint:"fs",targets:[{format:fmt}]},primitive:{topology:"triangle-list"}});
  const sm=dev.createSampler({});const bbg=dev.createBindGroup({layout:bp.getBindGroupLayout(0),entries:[{binding:0,resource:out.createView()},{binding:1,resource:sm}]});
  const e3=dev.createCommandEncoder();const rp2=e3.beginRenderPass({colorAttachments:[{view:ctx.getCurrentTexture().createView(),loadOp:"clear",storeOp:"store",clearValue:{r:0,g:0,b:0,a:1}}]});rp2.setPipeline(bp);rp2.setBindGroup(0,bbg);rp2.draw(3);rp2.end();dev.queue.submit([e3.finish()]);
  const ref=await imgData("../compact_data/sr_ref.png",WD,HD);const rc=document.getElementById("ref");rc.width=WD;rc.height=HD;rc.getContext("2d").putImageData(new ImageData(new Uint8ClampedArray(ref),WD,HD),0,0);
  await rb.mapAsync(GPUMapMode.READ);const g=new Uint8Array(rb.getMappedRange());
  let s=0,mx=0,n=0;for(let y=0;y<HD;y++)for(let x=0;x<WD;x++){const gi=y*bpr+x*4,ri=(y*WD+x)*4;for(let c=0;c<3;c++){const d=Math.abs(g[gi+c]-ref[ri+c]);s+=d;if(d>mx)mx=d;n++;}}
  rb.unmap();const mad=s/n;
  L(`${H}x${W} -> ${WD}x${HD} (x${upscale}), 34-layer wtile conv:`,"hd");
  L(`  conv compute (timestamp, best of 5): ${convMs.toFixed(2)} ms   [naive Chrome was ~1437 ms => ${(1437/convMs).toFixed(1)}x]`,"ok");
  L(`  full SR parity vs PyTorch: mean|Δ|=${mad.toFixed(4)} codes, max=${mx} -> ${mad<2?"PASS":"CHECK"}`,mad<2?"ok":"err");
  Object.assign(R,{ok:true,convMs,mad,max:mx});
}
main().catch(e=>{L("ERR "+e.message,"err");window.__w={error:e.message};});
</script>
