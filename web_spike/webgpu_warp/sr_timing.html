<!doctype html>
<meta charset="utf-8"><title>playhd — conv TRUE timing (REPS-amortized) in Chrome</title>
<style>body{font:13px monospace;background:#111;color:#ddd;margin:16px}#log{white-space:pre-wrap}.ok{color:#6f6}.hd{color:#9cf}</style>
<h3 class="hd">playhd — true conv compute time in Chrome (amortize over REPS to remove per-submit overhead)</h3><div id="log"></div>
<script type="module">
const L=(m,c="")=>{const d=document.getElementById("log");d.innerHTML+=`<span class="${c}">${m}</span>\n`;console.log(m);};
const R={};window.__t=R;
async function main(){
  const dev=await (await navigator.gpu.requestAdapter()).requestDevice();
  const meta=await (await fetch("../compact_data/layers.json")).json();const {layers,H,W}=meta;const FC=64,plane=H*W;
  const wf=new Float32Array(await (await fetch("../compact_data/weights.bin")).arrayBuffer());
  const Wb=dev.createBuffer({size:wf.byteLength,usage:GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST});dev.queue.writeBuffer(Wb,0,wf);
  const A=dev.createBuffer({size:FC*plane*4,usage:GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST|GPUBufferUsage.COPY_SRC});
  const B=dev.createBuffer({size:FC*plane*4,usage:GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_SRC|GPUBufferUsage.COPY_DST});
  const seed=new Float32Array(FC*plane);for(let i=0;i<3*plane;i++)seed[i]=(i%101)/101;dev.queue.writeBuffer(A,0,seed);
  const conv=dev.createShaderModule({code:`struct P{H:u32,W:u32,in_c:u32,out_c:u32,w_off:u32,b_off:u32,prelu_off:u32,has_prelu:u32};
    @group(0) @binding(0) var<storage,read> fin:array<f32>;@group(0) @binding(1) var<storage,read_write> fout:array<f32>;
    @group(0) @binding(2) var<storage,read> Wt:array<f32>;@group(0) @binding(3) var<uniform> u:P;
    @compute @workgroup_size(8,8,1) fn main(@builtin(global_invocation_id) g:vec3u){
      let x=i32(g.x);let y=i32(g.y);let oc=i32(g.z);if(x>=i32(u.W)||y>=i32(u.H)||oc>=i32(u.out_c)){return;}
      var acc=Wt[u.b_off+u32(oc)];let bw=u.w_off+u32(oc)*u.in_c*9u;
      for(var ic=0u;ic<u.in_c;ic=ic+1u){let pl=ic*u.H*u.W;let wic=bw+ic*9u;
        for(var ky=0;ky<3;ky=ky+1){let yy=y+ky-1;if(yy<0||yy>=i32(u.H)){continue;}
          for(var kx=0;kx<3;kx=kx+1){let xx=x+kx-1;if(xx<0||xx>=i32(u.W)){continue;}
            acc=acc+Wt[wic+u32(ky*3+kx)]*fin[pl+u32(yy)*u.W+u32(xx)];}}}
      if(u.has_prelu==1u){let s=Wt[u.prelu_off+u32(oc)];if(acc<0.0){acc=acc*s;}}
      fout[u32(oc)*u.H*u.W+u32(y)*u.W+u32(x)]=acc;}`});
  const pipe=dev.createComputePipeline({layout:"auto",compute:{module:conv,entryPoint:"main"}});
  let inb=A,outb=B;const passes=[];
  for(const ly of layers){const u=new Uint32Array([H,W,ly.in_c,ly.out_c,ly.w_off,ly.b_off,ly.prelu_off<0?0:ly.prelu_off,ly.prelu_off<0?0:1]);
    const ub=dev.createBuffer({size:32,usage:GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST});dev.queue.writeBuffer(ub,0,u);
    passes.push({bg:dev.createBindGroup({layout:pipe.getBindGroupLayout(0),entries:[{binding:0,resource:{buffer:inb}},{binding:1,resource:{buffer:outb}},{binding:2,resource:{buffer:Wb}},{binding:3,resource:{buffer:ub}}]}),gz:ly.out_c});[inb,outb]=[outb,inb];}
  const finalBuf=inb;
  async function timeReps(reps){
    const rb=dev.createBuffer({size:16,usage:GPUBufferUsage.COPY_DST|GPUBufferUsage.MAP_READ});
    const t0=performance.now();
    const enc=dev.createCommandEncoder();
    for(let r=0;r<reps;r++)for(const p of passes){const cp=enc.beginComputePass();cp.setPipeline(pipe);cp.setBindGroup(0,p.bg);cp.dispatchWorkgroups(Math.ceil(W/8),Math.ceil(H/8),p.gz);cp.end();}
    enc.copyBufferToBuffer(finalBuf,0,rb,0,16);dev.queue.submit([enc.finish()]);
    await rb.mapAsync(GPUMapMode.READ);rb.getMappedRange();rb.unmap();
    return performance.now()-t0;
  }
  await timeReps(2);  // warmup
  const t1=await timeReps(1), tN=await timeReps(30);
  const perPipe=(tN-t1)/29;  // marginal cost of 29 extra pipelines = true compute, removes fixed submit/sync overhead
  L(`${H}x${W}, 34 conv layers:`,"hd");
  L(`  1 rep submit: ${t1.toFixed(1)} ms   |   30 reps submit: ${tN.toFixed(1)} ms`);
  L(`  => fixed per-submit overhead ≈ ${(t1-perPipe).toFixed(1)} ms ; TRUE conv compute ≈ ${perPipe.toFixed(2)} ms/pipeline`,"ok");
  Object.assign(R,{ok:true,t1,tN,perPipe,H});
}
main().catch(e=>{L("ERR "+e.message,"err");window.__t={error:e.message};});
</script>
