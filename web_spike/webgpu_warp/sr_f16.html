<!doctype html>
<meta charset="utf-8"><title>playhd — on-GPU compact SR, fp16 (WebGPU shader-f16)</title>
<style>body{font:13px monospace;background:#111;color:#ddd;margin:16px}#log{white-space:pre-wrap}.ok{color:#6f6}.err{color:#f66}.hd{color:#9cf}</style>
<h3 class="hd">playhd — compact SR net in WebGPU, fp16 (f16 storage + f32 accumulate)</h3><div id="log"></div>
<script type="module">
const L=(m,c="")=>{const d=document.getElementById("log");d.innerHTML+=`<span class="${c}">${m}</span>\n`;console.log(m);};
const R={};window.__srf16=R;
const imgData=async(u,w,h)=>{const b=await createImageBitmap(await (await fetch(u)).blob());const c=new OffscreenCanvas(w,h);const x=c.getContext("2d");x.drawImage(b,0,0);return x.getImageData(0,0,w,h).data;};
async function main(){
  const adapter=await navigator.gpu.requestAdapter();
  if(!adapter.features.has("shader-f16")){L("shader-f16 NOT supported","err");R.error="no-f16";return;}
  const dev=await adapter.requestDevice({requiredFeatures:["shader-f16"]});
  const meta=await (await fetch("../compact_data/layers.json")).json();const {layers,upscale,H,W,n_passes}=meta;const HD=H*upscale,WD=W*upscale;
  L(`fp16 compact net: ${n_passes} passes, ${H}x${W} -> ${HD}x${WD} (x${upscale})`,"hd");
  // weights -> f16
  const wf32=new Float32Array(await (await fetch("../compact_data/weights.bin")).arrayBuffer());
  const wf16=new Float16Array(wf32);
  const W_gpu=dev.createBuffer({size:wf16.byteLength,usage:GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST});dev.queue.writeBuffer(W_gpu,0,wf16);
  const FC=64,plane=H*W,fsize=FC*plane*2;  // f16 = 2 bytes
  const A=dev.createBuffer({size:fsize,usage:GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST});
  const B=dev.createBuffer({size:fsize,usage:GPUBufferUsage.STORAGE});
  const px=await imgData("../compact_data/lr.png",W,H);const lp=new Float16Array(3*plane);
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){const i=(y*W+x)*4;for(let c=0;c<3;c++)lp[c*plane+y*W+x]=px[i+c]/255;}
  const LR=dev.createBuffer({size:lp.byteLength,usage:GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST});dev.queue.writeBuffer(LR,0,lp);
  const Ai=new Float16Array(FC*plane);Ai.set(lp.subarray(0,3*plane),0);dev.queue.writeBuffer(A,0,Ai);
  const conv=dev.createShaderModule({code:`enable f16;
    struct P{H:u32,W:u32,in_c:u32,out_c:u32,w_off:u32,b_off:u32,prelu_off:u32,has_prelu:u32};
    @group(0) @binding(0) var<storage,read> fin:array<f16>;@group(0) @binding(1) var<storage,read_write> fout:array<f16>;
    @group(0) @binding(2) var<storage,read> Wt:array<f16>;@group(0) @binding(3) var<uniform> u:P;
    @compute @workgroup_size(8,8,1) fn main(@builtin(global_invocation_id) g:vec3u){
      let x=i32(g.x);let y=i32(g.y);let oc=i32(g.z);if(x>=i32(u.W)||y>=i32(u.H)||oc>=i32(u.out_c)){return;}
      var acc=f32(Wt[u.b_off+u32(oc)]);let bw=u.w_off+u32(oc)*u.in_c*9u;       // f32 accumulate (parity)
      for(var ic=0u;ic<u.in_c;ic=ic+1u){let pl=ic*u.H*u.W;let wic=bw+ic*9u;
        for(var ky=0;ky<3;ky=ky+1){let yy=y+ky-1;if(yy<0||yy>=i32(u.H)){continue;}
          for(var kx=0;kx<3;kx=kx+1){let xx=x+kx-1;if(xx<0||xx>=i32(u.W)){continue;}
            acc=acc+f32(Wt[wic+u32(ky*3+kx)])*f32(fin[pl+u32(yy)*u.W+u32(xx)]);}}}
      if(u.has_prelu==1u){let s=f32(Wt[u.prelu_off+u32(oc)]);if(acc<0.0){acc=acc*s;}}
      fout[u32(oc)*u.H*u.W+u32(y)*u.W+u32(x)]=f16(acc);}`});
  const ci=await conv.getCompilationInfo();if(ci.messages.some(m=>m.type==="error")){L("CONV ERR: "+ci.messages.map(m=>m.message).join(" | "),"err");R.error="conv";return;}
  const cpipe=dev.createComputePipeline({layout:"auto",compute:{module:conv,entryPoint:"main"}});
  const t0=performance.now();let inb=A,outb=B;const bgs=[];
  for(const ly of layers){const u=new Uint32Array([H,W,ly.in_c,ly.out_c,ly.w_off,ly.b_off,ly.prelu_off<0?0:ly.prelu_off,ly.prelu_off<0?0:1]);
    const ub=dev.createBuffer({size:32,usage:GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST});dev.queue.writeBuffer(ub,0,u);
    bgs.push({bg:dev.createBindGroup({layout:cpipe.getBindGroupLayout(0),entries:[{binding:0,resource:{buffer:inb}},{binding:1,resource:{buffer:outb}},{binding:2,resource:{buffer:W_gpu}},{binding:3,resource:{buffer:ub}}]}),gz:ly.out_c});[inb,outb]=[outb,inb];}
  const enc=dev.createCommandEncoder();for(const b of bgs){const p=enc.beginComputePass();p.setPipeline(cpipe);p.setBindGroup(0,b.bg);p.dispatchWorkgroups(Math.ceil(W/8),Math.ceil(H/8),b.gz);p.end();}dev.queue.submit([enc.finish()]);
  const featLast=inb;
  const out=dev.createTexture({size:[WD,HD],format:"rgba8unorm",usage:GPUTextureUsage.RENDER_ATTACHMENT|GPUTextureUsage.COPY_SRC});
  const psh=dev.createShaderModule({code:`enable f16;
    struct P{H:u32,W:u32,up:u32,_p:u32};@group(0) @binding(0) var<storage,read> feat:array<f16>;@group(0) @binding(1) var<storage,read> lr:array<f16>;@group(0) @binding(2) var<uniform> u:P;
    @vertex fn vs(@builtin(vertex_index) i:u32)->@builtin(position) vec4f{var p=array<vec2f,3>(vec2f(-1,-1),vec2f(3,-1),vec2f(-1,3));return vec4f(p[i],0,1);}
    @fragment fn fs(@builtin(position) pos:vec4f)->@location(0) vec4f{let X=i32(floor(pos.x));let Y=i32(floor(pos.y));let up=i32(u.up);let x=X/up;let y=Y/up;let i=Y%up;let j=X%up;let pl=u.H*u.W;
      var rgb=vec3f(0.0);for(var c=0;c<3;c=c+1){let ch=u32(c*up*up+i*up+j);rgb[c]=clamp(f32(feat[ch*pl+u32(y)*u.W+u32(x)])+f32(lr[u32(c)*pl+u32(y)*u.W+u32(x)]),0.0,1.0);}return vec4f(rgb,1.0);}`});
  const fp=dev.createRenderPipeline({layout:"auto",vertex:{module:psh,entryPoint:"vs"},fragment:{module:psh,entryPoint:"fs",targets:[{format:"rgba8unorm"}]},primitive:{topology:"triangle-list"}});
  const fu=new Uint32Array([H,W,upscale,0]);const fub=dev.createBuffer({size:16,usage:GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST});dev.queue.writeBuffer(fub,0,fu);
  const fbg=dev.createBindGroup({layout:fp.getBindGroupLayout(0),entries:[{binding:0,resource:{buffer:featLast}},{binding:1,resource:{buffer:LR}},{binding:2,resource:{buffer:fub}}]});
  const e2=dev.createCommandEncoder();const rp=e2.beginRenderPass({colorAttachments:[{view:out.createView(),loadOp:"clear",storeOp:"store",clearValue:{r:0,g:0,b:0,a:1}}]});rp.setPipeline(fp);rp.setBindGroup(0,fbg);rp.draw(3);rp.end();
  const bpr=Math.ceil(WD*4/256)*256;const rb=dev.createBuffer({size:bpr*HD,usage:GPUBufferUsage.COPY_DST|GPUBufferUsage.MAP_READ});
  e2.copyTextureToBuffer({texture:out},{buffer:rb,bytesPerRow:bpr,rowsPerImage:HD},[WD,HD]);dev.queue.submit([e2.finish()]);
  await dev.queue.onSubmittedWorkDone();const ms=performance.now()-t0;
  const ref=await imgData("../compact_data/sr_ref.png",WD,HD);
  await rb.mapAsync(GPUMapMode.READ);const g=new Uint8Array(rb.getMappedRange());
  let s=0,mx=0,n=0;for(let y=0;y<HD;y++)for(let x=0;x<WD;x++){const gi=y*bpr+x*4,ri=(y*WD+x)*4;for(let c=0;c<3;c++){const d=Math.abs(g[gi+c]-ref[ri+c]);s+=d;if(d>mx)mx=d;n++;}}
  rb.unmap();const mad=s/n;
  L(`fp16 SR done in ${ms.toFixed(0)} ms (fp32 was ~1330 ms)`,"ok");
  L(`PARITY vs PyTorch fp32 ref: mean|Δ|=${mad.toFixed(3)} codes, max=${mx}  (fp16 vs fp32: expect small, visually identical)`,mad<3?"ok":"err");
  Object.assign(R,{ok:true,mad,max:mx,ms});
}
main().catch(e=>{L("ERROR: "+e.message,"err");window.__srf16={error:e.message};});
</script>
