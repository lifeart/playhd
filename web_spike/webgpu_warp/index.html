<!doctype html>
<meta charset="utf-8">
<title>playhd — WebGPU MV-warp propagation demo (P1 core)</title>
<style>
  body{font:13px monospace;background:#111;color:#ddd;margin:16px}
  canvas{border:1px solid #333;image-rendering:pixelated;max-width:48%}
  #log{white-space:pre-wrap;margin-top:10px}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .ok{color:#6f6}.err{color:#f66}.hd{color:#9cf}
</style>
<h3 class="hd">playhd — codec-MV backward warp in WebGPU (instant-tier propagation core)</h3>
<div class="row">
  <div><div>WebGPU warp (anchor warped by frame+1 MVs)</div><canvas id="gpu"></canvas></div>
  <div><div>Python reference (prototype warp_hd, cv2.remap)</div><canvas id="ref"></canvas></div>
</div>
<div id="log"></div>
<script type="module">
const log = (m, c="") => { const d=document.getElementById("log"); d.innerHTML += `<span class="${c}">${m}</span>\n`; console.log(m); };
const WARP_DONE = {}; window.__warp = WARP_DONE;   // surfaced for headless verification

async function main(){
  if(!navigator.gpu){ log("WebGPU NOT available in this browser","err"); WARP_DONE.error="no-webgpu"; return; }
  const meta = await (await fetch("../demo_data/meta.json")).json();
  const {w_lr,h_lr,scale,w_hd,h_hd} = meta;
  log(`meta: SD ${w_lr}x${h_lr} -> HD ${w_hd}x${h_hd} (x${scale}), ${meta.n_mvs} MVs, hole ${(meta.hole_frac*100).toFixed(1)}%`,"hd");

  const adapter = await navigator.gpu.requestAdapter();
  const device  = await adapter.requestDevice();
  log("WebGPU device acquired: "+(adapter.info?.description||"ok"),"ok");

  // --- anchor texture (HD, rgba8) ---
  const anchorBmp = await createImageBitmap(await (await fetch("../demo_data/anchor.png")).blob());
  const anchorTex = device.createTexture({ size:[w_hd,h_hd], format:"rgba8unorm",
    usage:GPUTextureUsage.TEXTURE_BINDING|GPUTextureUsage.COPY_DST|GPUTextureUsage.RENDER_ATTACHMENT });
  device.queue.copyExternalImageToTexture({source:anchorBmp},{texture:anchorTex},[w_hd,h_hd]);

  // --- flow texture (LR, rgba32float = [fx,fy,0,0]) ---
  const flowBuf = new Float32Array(await (await fetch("../demo_data/flow.bin")).arrayBuffer());
  const flowTex = device.createTexture({ size:[w_lr,h_lr], format:"rgba32float",
    usage:GPUTextureUsage.TEXTURE_BINDING|GPUTextureUsage.COPY_DST });
  device.queue.writeTexture({texture:flowTex}, flowBuf, {bytesPerRow:w_lr*16, rowsPerImage:h_lr}, [w_lr,h_lr]);

  const samp = device.createSampler({magFilter:"linear",minFilter:"linear",
    addressModeU:"clamp-to-edge",addressModeV:"clamp-to-edge"});   // clamp == cv2 BORDER_REPLICATE

  // uniforms: w_hd,h_hd,scale
  const uni = device.createBuffer({size:16,usage:GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST});
  device.queue.writeBuffer(uni,0,new Uint32Array([w_hd,h_hd,scale,0]));

  // --- WGSL: reproduce derisk.warp_hd exactly ---
  //   dst = integer HD pixel; lr = dst/scale (nearest); f = flow_lr[lr];
  //   srcCoord(cv2) = dst + f*scale; uv = (srcCoord+0.5)/hd; bilinear clamp sample of anchor.
  const shader = device.createShaderModule({code:`
    struct U { w:u32, h:u32, scale:u32, _p:u32 };
    @group(0) @binding(0) var anchorTex: texture_2d<f32>;
    @group(0) @binding(1) var samp: sampler;
    @group(0) @binding(2) var flowTex: texture_2d<f32>;
    @group(0) @binding(3) var<uniform> u: U;
    @vertex fn vs(@builtin(vertex_index) i:u32) -> @builtin(position) vec4f {
      var p = array<vec2f,3>(vec2f(-1,-1),vec2f(3,-1),vec2f(-1,3));
      return vec4f(p[i],0,1);
    }
    @fragment fn fs(@builtin(position) pos: vec4f) -> @location(0) vec4f {
      let dst = vec2i(floor(pos.xy));
      let lr  = dst / i32(u.scale);
      let f   = textureLoad(flowTex, lr, 0).xy;          // fx_lr, fy_lr (nan already ->0 offline)
      let src = vec2f(dst) + f * f32(u.scale);           // cv2 source coordinate
      let uv  = (src + vec2f(0.5)) / vec2f(f32(u.w), f32(u.h));
      return vec4f(textureSample(anchorTex, samp, uv).rgb, 1.0);
    }`});

  const canvas = document.getElementById("gpu"); canvas.width=w_hd; canvas.height=h_hd;
  const ctx = canvas.getContext("webgpu");
  const fmt = navigator.gpu.getPreferredCanvasFormat();
  ctx.configure({device,format:fmt,alphaMode:"opaque"});

  const pipe = device.createRenderPipeline({layout:"auto",
    vertex:{module:shader,entryPoint:"vs"},
    fragment:{module:shader,entryPoint:"fs",targets:[{format:fmt}]},
    primitive:{topology:"triangle-list"}});
  const bind = device.createBindGroup({layout:pipe.getBindGroupLayout(0),entries:[
    {binding:0,resource:anchorTex.createView()},{binding:1,resource:samp},
    {binding:2,resource:flowTex.createView()},{binding:3,resource:{buffer:uni}}]});

  // also render to an offscreen rgba8 target we can read back for the parity check
  const offTex = device.createTexture({size:[w_hd,h_hd],format:"rgba8unorm",
    usage:GPUTextureUsage.RENDER_ATTACHMENT|GPUTextureUsage.COPY_SRC});
  const offPipe = device.createRenderPipeline({layout:"auto",
    vertex:{module:shader,entryPoint:"vs"},
    fragment:{module:shader,entryPoint:"fs",targets:[{format:"rgba8unorm"}]},
    primitive:{topology:"triangle-list"}});
  const offBind = device.createBindGroup({layout:offPipe.getBindGroupLayout(0),entries:[
    {binding:0,resource:anchorTex.createView()},{binding:1,resource:samp},
    {binding:2,resource:flowTex.createView()},{binding:3,resource:{buffer:uni}}]});

  const t0 = performance.now();
  const enc = device.createCommandEncoder();
  for(const [p,b,view] of [[pipe,bind,ctx.getCurrentTexture().createView()],[offPipe,offBind,offTex.createView()]]){
    const pass = enc.beginRenderPass({colorAttachments:[{view,loadOp:"clear",storeOp:"store",clearValue:{r:0,g:0,b:0,a:1}}]});
    pass.setPipeline(p); pass.setBindGroup(0,b); pass.draw(3); pass.end();
  }
  // copy offscreen -> readback buffer (bytesPerRow padded to 256)
  const bpr = Math.ceil(w_hd*4/256)*256;
  const rb = device.createBuffer({size:bpr*h_hd,usage:GPUBufferUsage.COPY_DST|GPUBufferUsage.MAP_READ});
  enc.copyTextureToBuffer({texture:offTex},{buffer:rb,bytesPerRow:bpr,rowsPerImage:h_hd},[w_hd,h_hd]);
  device.queue.submit([enc.finish()]);
  await device.queue.onSubmittedWorkDone();
  const dt = performance.now()-t0;
  log(`warp rendered to canvas + offscreen in ${dt.toFixed(2)} ms`,"ok");

  // --- parity vs the Python reference (prototype warp_hd) ---
  const refBmp = await createImageBitmap(await (await fetch("../demo_data/ref_warp.png")).blob());
  const rc = document.getElementById("ref"); rc.width=w_hd; rc.height=h_hd;
  const rctx = rc.getContext("2d"); rctx.drawImage(refBmp,0,0);
  const ref = rctx.getImageData(0,0,w_hd,h_hd).data;

  await rb.mapAsync(GPUMapMode.READ);
  const gpu = new Uint8Array(rb.getMappedRange());
  let sum=0, max=0, n=0;
  for(let y=0;y<h_hd;y++){
    for(let x=0;x<w_hd;x++){
      const gi=y*bpr+x*4, ri=(y*w_hd+x)*4;
      for(let ch=0;ch<3;ch++){ const d=Math.abs(gpu[gi+ch]-ref[ri+ch]); sum+=d; if(d>max)max=d; n++; }
    }
  }
  const mad = sum/n;
  const pass = mad < 2.0;   // bilinear/border rounding between cv2.remap and WGSL should be sub-2-codes
  log(`PARITY vs prototype warp_hd: mean|Δ|=${mad.toFixed(3)} codes, max|Δ|=${max}  -> ${pass?"PASS":"CHECK"}`, pass?"ok":"err");
  rb.unmap();

  // --- steady-state warp throughput (the real-time claim): render-only, no setup/readback ---
  const ITERS=300;
  const t1=performance.now();
  for(let k=0;k<ITERS;k++){
    const e=device.createCommandEncoder();
    const pass=e.beginRenderPass({colorAttachments:[{view:offTex.createView(),loadOp:"clear",storeOp:"store",clearValue:{r:0,g:0,b:0,a:1}}]});
    pass.setPipeline(offPipe); pass.setBindGroup(0,offBind); pass.draw(3); pass.end();
    device.queue.submit([e.finish()]);
  }
  await device.queue.onSubmittedWorkDone();
  const perWarp=(performance.now()-t1)/ITERS;
  const fps=1000/perWarp;
  log(`steady-state warp: ${perWarp.toFixed(3)} ms/frame -> ${fps.toFixed(0)} warps/sec (1280x640)`,"ok");

  Object.assign(WARP_DONE,{ok:true,mad,max,ms:dt,perWarpMs:perWarp,warpsPerSec:Math.round(fps),w_hd,h_hd,pass});
  log("WARP DEMO COMPLETE","ok");
}
main().catch(e=>{ log("ERROR: "+e.message,"err"); window.__warp={error:e.message}; });
</script>
