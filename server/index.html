<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>playhd — video upscaler</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%232f81f7'/><path d='M12.5 9.5L23 16L12.5 22.5Z' fill='white'/></svg>" />
<meta name="theme-color" content="#0e1117" />
<style>
  :root { color-scheme: dark; --bg:#0e1117; --panel:#161b22; --border:#30363d;
          --muted:#8b949e; --fg:#e6edf3; --blue:#2f81f7; --green:#3fb950; }
  * { box-sizing: border-box; }
  body { margin:0; font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
         background: radial-gradient(1100px 520px at 50% -8%, #17213c 0%, var(--bg) 56%);
         color:var(--fg); padding:26px 18px 56px; min-height:100vh; }
  .wrap { max-width:900px; margin:0 auto; }
  header { display:flex; align-items:center; gap:12px; margin:0 0 20px; }
  .logo { width:36px; height:36px; border-radius:10px; flex:0 0 auto; display:flex;
          align-items:center; justify-content:center; color:#fff;
          background:linear-gradient(135deg,var(--blue),var(--green)); box-shadow:0 5px 16px #2f81f73a; }
  .logo svg { width:19px; height:19px; }
  h1 { font-size:19px; margin:0; letter-spacing:.2px; }
  .sub { color:var(--muted); margin:1px 0 0; font-size:12.5px; }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:12px;
           padding:18px 20px; margin:0 0 18px; box-shadow:0 1px 0 #ffffff08 inset, 0 10px 28px #0006; }
  label { display:block; font-weight:600; margin:14px 0 6px; font-size:13px; }
  label:first-child { margin-top:0; }
  select, input[type=file] { width:100%; padding:9px 11px; background:#0d1117; color:var(--fg);
    border:1px solid var(--border); border-radius:7px; font-size:14px; transition:border-color .15s; }
  select:focus, input[type=file]:focus { outline:none; border-color:var(--blue); }
  .row { display:flex; gap:16px; flex-wrap:wrap; }
  .row > div { flex:1; min-width:220px; }
  .modes { display:flex; gap:10px; margin-top:6px; flex-wrap:wrap; }
  .mode { flex:1; min-width:150px; border:1px solid var(--border); border-radius:9px; padding:12px;
          cursor:pointer; background:#0d1117; transition:border-color .15s, background .15s, transform .08s; }
  .mode:hover { border-color:#3d4756; }
  .mode:active { transform:translateY(1px); }
  .mode.sel { border-color:var(--blue); background:#11203a; box-shadow:0 0 0 1px var(--blue) inset; }
  .mode .t { font-weight:700; font-size:14px; }
  .mode .d { color:var(--muted); font-size:12px; margin-top:4px; }
  .opts { margin-top:12px; display:flex; flex-direction:column; gap:9px; }
  .opt { display:flex; align-items:flex-start; gap:9px; font-weight:400; margin:0; cursor:pointer; }
  .opt input { width:auto; margin-top:3px; accent-color:var(--blue); flex:0 0 auto; }
  button#go { margin-top:18px; width:100%; padding:13px; font-size:16px; font-weight:700; color:#fff;
              background:linear-gradient(180deg,#2ea043,#238636); border:0; border-radius:9px;
              cursor:pointer; display:flex; align-items:center; justify-content:center; gap:9px;
              transition:filter .15s; }
  button#go:hover:not(:disabled) { filter:brightness(1.08); }
  button#go:disabled { background:#30363d; color:var(--muted); cursor:progress; filter:none; }
  .spin { width:15px; height:15px; border:2px solid #ffffff44; border-top-color:#fff;
          border-radius:50%; animation:spin .7s linear infinite; display:none; }
  button#go:disabled .spin { display:inline-block; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #progressWrap { margin-top:16px; display:none; }
  .bar { position:relative; height:16px; background:#0d1117; border:1px solid var(--border);
         border-radius:9px; overflow:hidden; }
  .bar > i { display:block; height:100%; width:0%; border-radius:9px;
             background:linear-gradient(90deg,var(--blue),var(--green)); transition:width .3s ease; }
  .bar.indet > i { width:32%; background:linear-gradient(90deg,transparent,var(--blue),transparent);
                   animation:indet 1.15s ease-in-out infinite; }
  @keyframes indet { 0%{transform:translateX(-110%)} 100%{transform:translateX(330%)} }
  .bar .pct { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
              font:700 10px/1 ui-monospace,monospace; color:#dfe7f0; letter-spacing:.5px;
              text-shadow:0 1px 2px #000b; }
  #progressText { margin-top:7px; font-size:12.5px; color:var(--muted);
                  font-family:ui-monospace,SFMono-Regular,monospace; }
  #status { margin-top:12px; font-size:13px; color:var(--muted); min-height:18px;
            display:flex; align-items:center; gap:8px; }
  #status.err { color:#f85149; } #status.ok { color:var(--green); }
  #status .dot { width:7px; height:7px; border-radius:50%; background:currentColor; flex:0 0 auto; }
  #status .dot.live { animation:pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 #3fb95066} 70%{box-shadow:0 0 0 6px #3fb95000}
                     100%{box-shadow:0 0 0 0 #3fb95000} }
  .playerHead { display:flex; align-items:center; gap:9px; margin-bottom:10px; flex-wrap:wrap; }
  .playerHead .t { font-weight:700; font-size:14px; }
  .badge { font:700 10.5px/1 ui-monospace,monospace; padding:4px 8px; border-radius:6px;
           background:#11203a; color:#79c0ff; border:1px solid #1f6feb55; }
  .badge.live { background:#12261a; color:#56d364; border-color:#3fb95055;
                display:inline-flex; align-items:center; gap:6px; }
  .badge.live::before { content:""; width:6px; height:6px; border-radius:50%; background:#56d364;
                        animation:pulse 1.2s ease-in-out infinite; }
  .videoWrap { position:relative; }
  video { width:100%; border-radius:9px; background:#000; display:block; }
  .unmute { position:absolute; left:12px; bottom:54px; z-index:5; display:none; cursor:pointer;
            background:#0d1117dd; color:#fff; border:1px solid #ffffff33; border-radius:8px;
            padding:7px 13px; font-size:13px; font-weight:600; backdrop-filter:blur(4px);
            box-shadow:0 4px 14px #0008; }
  .unmute:hover { background:#0d1117f5; border-color:#ffffff55; }
  .stats { font-size:12px; color:var(--muted); margin-top:10px; white-space:pre-wrap;
           font-family:ui-monospace,SFMono-Regular,monospace; background:#0d1117;
           border:1px solid var(--border); border-radius:8px; padding:10px 12px; }
  small.hint { color:#6e7681; font-weight:400; }
</style>
</head>
<body>
  <div class="wrap">
  <header>
    <div class="logo"><svg viewBox="0 0 24 24"><path d="M8 6l10 6-10 6z" fill="#fff"/></svg></div>
    <div>
      <h1>playhd <span style="color:var(--muted);font-weight:500">— video upscaler</span></h1>
      <p class="sub">Pick a clip → Process &amp; Play. SD → HD (×4), with sound, any length.</p>
    </div>
  </header>

  <div class="panel">
    <div class="row">
      <div>
        <label>Source clip <small class="hint">(server-side)</small></label>
        <select id="source"></select>
      </div>
      <div>
        <label>…or upload an mp4</label>
        <input type="file" id="file" accept="video/mp4,.mp4" />
      </div>
    </div>

    <label>Mode</label>
    <div class="modes" id="modes"></div>

    <div id="estimate" class="hint" style="margin:8px 0 2px"></div>
    <div class="opts">
      <label class="opt">
        <input type="checkbox" id="stream" checked />
        <span class="hint">▶ Play while processing (instant — streams the upscaled clip as it is
        produced via Media Source Extensions so playback starts in ~1–2 s instead of waiting for the
        whole clip). On by default (Chrome/Safari; falls back to a normal &lt;video&gt; if MSE is
        unavailable). Uncheck to render the whole clip first.</span>
      </label>
      <label class="opt">
        <input type="checkbox" id="smooth2x" />
        <span class="hint">✨ Smooth 2× fps (instant — interpolates a motion-compensated frame between
        each pair → twice the frame rate, smoother playback). ~halves throughput; uses the buffered
        path (not the live stream).</span>
      </label>
    </div>

    <button id="go"><span class="spin"></span><span id="goLabel">Process &amp; Play</span></button>

    <div id="progressWrap">
      <div class="bar"><i id="bar"></i><span id="pct" class="pct"></span></div>
      <div id="progressText"></div>
    </div>
    <div id="status"></div>
  </div>

  <div class="panel" id="playerPanel" style="display:none">
    <div class="playerHead"><span class="t">Result</span><span id="playerBadge" class="badge">—</span></div>
    <div class="videoWrap">
      <video id="player" controls autoplay playsinline muted></video>
      <button id="unmute" class="unmute">🔊 Tap for sound</button>
    </div>
    <div class="stats" id="stats"></div>
  </div>
  </div>

<script>
const $ = (id) => document.getElementById(id);
let selectedMode = "auto";
let pollTimer = null;
let sourcesData = [];

function humanT(s) {
  s = Math.round(s);
  if (s < 90) return s + "s";
  if (s < 3600) return Math.round(s / 60) + "m";
  return (s / 3600).toFixed(1) + "h";
}

// Show the selected source's duration + an estimated processing time for the chosen mode,
// and warn before a long render (the pipeline is ~10x slower than real-time).
function updateEstimate() {
  const el = $("estimate");
  if ($("file").files.length) {            // uploaded file: estimate only known after upload
    el.textContent = "Uploaded clip — processing time shown once it starts. Short clips recommended.";
    el.style.color = "";
    return;
  }
  if (selectedMode === "auto") {           // auto picks the mode server-side after a quick probe
    el.textContent = "Auto — analyzes the first ~2 s and picks Instant / Quality / Layered for you.";
    el.style.color = "";
    return;
  }
  const src = sourcesData.find((x) => x.name === $("source").value);
  if (!src || !src.est_s || src.est_s[selectedMode] == null) { el.textContent = ""; return; }
  const est = src.est_s[selectedMode];
  const dur = src.duration_s != null ? humanT(src.duration_s) : "?";
  let msg = `Source ${dur} · est. ~${humanT(est)} to process (${selectedMode})`;
  if (est > 180) {
    msg += " ⚠ long render — try a short clip / few-second upload first";
    el.style.color = "#d9772b";
  } else { el.style.color = ""; }
  el.textContent = msg;
}

async function loadSources() {
  const r = await fetch("/api/sources");
  if (!r.ok) { setStatus("failed to load sources", true); return; }
  const data = await r.json();
  sourcesData = data.sources;

  const sel = $("source");
  sel.innerHTML = "";
  for (const s of data.sources) {
    const o = document.createElement("option");
    o.value = s.name;
    const dur = s.duration_s != null ? `, ${humanT(s.duration_s)}` : "";
    o.textContent = `${s.name} (${s.size_mb} MB${dur})`;
    sel.appendChild(o);
  }
  sel.onchange = updateEstimate;
  $("file").onchange = updateEstimate;

  const modes = $("modes");
  modes.innerHTML = "";
  for (const m of data.modes) {
    const div = document.createElement("div");
    div.className = "mode" + (m.id === selectedMode ? " sel" : "");
    div.dataset.id = m.id;
    div.innerHTML = `<div class="t">${m.label}</div><div class="d">${m.desc}</div>`;
    div.onclick = () => {
      selectedMode = m.id;
      [...modes.children].forEach((c) => c.classList.toggle("sel", c.dataset.id === m.id));
      updateEstimate();
    };
    modes.appendChild(div);
  }
  updateEstimate();
}

// kind: undefined/false = info, true|'err' = error, 'ok' = success, 'live' = streaming (pulsing dot)
function setStatus(html, kind) {
  const k = (kind === true) ? "err" : (kind || "info");
  const s = $("status");
  s.className = (k === "err") ? "err" : (k === "ok" || k === "live") ? "ok" : "";
  if (!html) { s.innerHTML = ""; return; }
  s.innerHTML = `<span class="dot${k === "live" ? " live" : ""}"></span><span>${html}</span>`;
}

function setBadge(text, live) {
  const b = $("playerBadge");
  b.className = "badge" + (live ? " live" : "");
  b.textContent = text;
}

// Play WITH sound; if the browser blocks unmuted autoplay (the click's user-gesture window expired
// during a long render), fall back to MUTED autoplay (always allowed) so the video is VISIBLE, and
// surface a one-tap unmute button — instead of a stuck spinner / paused frame the user must hunt for.
function playResult(v) {
  const un = $("unmute");
  un.style.display = "none";
  v.muted = false;
  v.play().then(() => { un.style.display = "none"; }).catch(() => {
    v.muted = true;
    v.play().then(() => {
      un.style.display = "block";
      un.onclick = () => { v.muted = false; un.style.display = "none"; v.play().catch(() => {}); };
    }).catch(() => {});
  });
}

function fmt(t) { return (t == null) ? "—" : `${t}s`; }

function renderProgress(p) {
  const total = p.total || 0;
  const done = p.done || 0;
  const barEl = $("bar").parentElement;                 // the .bar container
  // Determinate only when we know the total (processing/muxing). Probing / segmenting / streaming
  // have an unknown total -> an indeterminate sliding animation instead of a stuck 0%.
  const determinate = total > 0 && (p.state === "processing" || p.state === "muxing" || p.state === "done");
  if (determinate) {
    const pct = Math.min(100, Math.round((done / total) * 100));
    barEl.classList.remove("indet");
    $("bar").style.width = pct + "%";
    $("pct").textContent = pct + "%";
  } else {
    barEl.classList.add("indet");
    $("pct").textContent = "";
  }
  const nice = { probing: "probing", segmenting: "segmenting scenes", processing: "upscaling",
                 muxing: "muxing audio", streaming: "streaming", done: "done" };
  let line = (nice[p.state] || p.state) + ` · ${done}${total ? "/" + total : ""} frames`;
  if (p.elapsed_s != null) line += ` · ${fmt(p.elapsed_s)}`;
  if (p.eta_s != null && p.state === "processing") line += ` · ETA ${fmt(p.eta_s)}`;
  if (p.ms_per_frame != null) line += ` · ${p.ms_per_frame} ms/frame`;
  $("progressText").textContent = line;
}

async function pollProgress() {
  try {
    const r = await fetch("/api/progress", { cache: "no-store" });
    if (r.ok) renderProgress(await r.json());
  } catch (e) { /* transient; keep polling */ }
}

// Instant mode: progressive play-while-process. Stream a fragmented MP4 from /api/stream and
// start playing after the first fragment (~1-2 s) while the server keeps upscaling the rest.
// (Quality / layered stay on the buffered POST /api/process path below — they are ~10x slower.)
async function runStreaming(btn) {
  try {
    let srcName = $("source").value;
    const f = $("file").files[0];
    if (f) {                                  // upload first so GET /api/stream can resolve it
      setStatus("Uploading…");
      const ufd = new FormData(); ufd.append("file", f);
      const ur = await fetch("/api/upload", { method: "POST", body: ufd });
      if (!ur.ok) { setStatus("Upload failed: " + (await ur.text()), true); btn.disabled = false; return; }
      srcName = (await ur.json()).name;
    }
    setStatus("Connecting — streaming <b>instant</b> as it processes…", "live");
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(pollProgress, 400);

    $("playerPanel").style.display = "";
    setBadge("CONNECTING", false);
    $("stats").textContent = "mode : instant (progressive fMP4 — play-while-process)\nstreaming…";
    const v = $("player");
    v.muted = false;                          // play WITH sound
    const url = `/api/stream?source=${encodeURIComponent(srcName)}&mode=instant`;
    const finish = () => { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } btn.disabled = false; };
    v.onplaying = () => { setStatus("Playing as it processes — instant, real-time 720p, with sound.", "live");
                          setBadge("LIVE · Instant 720p", true); };
    v.onended = () => { finish(); setBadge("Instant 720p", false); };

    // The fragmented-MP4 stream is consumed via Media Source Extensions (MSE) — the reliable way
    // Chrome plays live fMP4. We feed the same bytes a plain <video src> would, but appended to a
    // SourceBuffer so playback starts after the first fragment. Falls back to <video src> on browsers
    // without MSE (e.g. Safari plays fMP4 directly).
    const MIME = ['video/mp4; codecs="avc1.640028,mp4a.40.2"',
                  'video/mp4; codecs="avc1.64001f,mp4a.40.2"',
                  'video/mp4; codecs="avc1.4d4028,mp4a.40.2"']
                 .find(m => window.MediaSource && MediaSource.isTypeSupported(m));
    if (window.MediaSource && MIME) {
      playViaMSE(v, url, MIME, btn, finish);
    } else {                                  // native fallback (Safari handles fMP4 over <video src>)
      v.onerror = () => { finish(); setStatus("Stream failed — server may be busy; try again.", true); };
      v.src = url; v.load(); playResult(v);
    }
  } catch (e) {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    setStatus("Stream request failed: " + e, true);
    btn.disabled = false;
  }
}

// Append a live fragmented-MP4 stream to a MediaSource SourceBuffer. Pulls the HTTP response body
// as a ReadableStream and appends each chunk; evicts already-played buffer on QuotaExceeded so
// arbitrarily long clips keep playing. Starts playback as soon as the first fragment is appended.
function playViaMSE(v, url, mime, btn, finish) {
  const ms = new MediaSource();
  v.src = URL.createObjectURL(ms);
  ms.addEventListener("sourceopen", async () => {
    let sb;
    try { sb = ms.addSourceBuffer(mime); sb.mode = "sequence"; }
    catch (e) { setStatus("MSE init failed: " + e, true); finish(); return; }
    let resp;
    try { resp = await fetch(url); } catch (e) { setStatus("Stream fetch failed: " + e, true); finish(); return; }
    if (!resp.ok) {
      setStatus("Stream failed — HTTP " + resp.status + (resp.status === 409 ? " (server busy)" : ""), true);
      finish(); return;
    }
    const reader = resp.body.getReader();
    const queue = [];
    let reading = true, started = false;
    sb.addEventListener("error", () => setStatus("Playback decode error.", true));
    sb.addEventListener("updateend", pump);
    function pump() {
      if (sb.updating || !queue.length) {
        if (!reading && !queue.length && !sb.updating && ms.readyState === "open") {
          try { ms.endOfStream(); } catch (e) { /* already ended */ }
        }
        return;
      }
      try {
        sb.appendBuffer(queue[0]); queue.shift();
        if (!started) { started = true; playResult(v); }
      } catch (e) {
        if (e.name === "QuotaExceededError") {                 // evict already-played buffer, retry
          const cur = v.currentTime;
          if (sb.buffered.length && sb.buffered.start(0) < cur - 5) {
            try { sb.remove(sb.buffered.start(0), cur - 5); } catch (_) {}
          }
        } else { setStatus("Append error: " + e, true); }
      }
    }
    (async () => {
      try {
        while (true) { const { value, done } = await reader.read(); if (done) { reading = false; pump(); break; } queue.push(value); pump(); }
      } catch (e) { reading = false; }
    })();
  });
}

$("go").onclick = async () => {
  const btn = $("go");
  btn.disabled = true;
  $("progressWrap").style.display = "";
  $("bar").parentElement.classList.add("indet");
  $("pct").textContent = "";
  $("progressText").textContent = "starting…";
  setStatus("");

  // Progressive play-while-process. Triggers for explicit Instant, AND for Auto when the cheap
  // probe resolves to instant (so the DEFAULT "Auto" plays-while-processing too, not just Instant).
  // Quality/Layered (and Auto resolving to them) use the buffered path below -- they aren't real-time.
  if ($("stream").checked && (selectedMode === "instant" || selectedMode === "auto")) {
    if (selectedMode === "instant") { return runStreaming(btn); }
    if (!$("file").files[0]) {                          // Auto + server-side source: probe the mode
      try {
        const rec = await fetch("/api/recommend?source=" + encodeURIComponent($("source").value))
                          .then((r) => r.json());
        if (rec.mode === "instant") { setStatus("Auto → <b>instant</b> — streaming…"); return runStreaming(btn); }
        setStatus(`Auto → <b>${rec.mode}</b> — rendering (this mode isn't streamed live).`);
      } catch (e) { /* probe failed -> fall through to the buffered path */ }
    }
  }

  let modeNote = ".";
  if (selectedMode === "auto") modeNote = " — analyzing content (~2 s) to pick the best mode…";
  else if (selectedMode === "quality") modeNote = " — heavy x4plus anchor, this is the slow path.";
  else if (selectedMode === "layered")
    modeNote = " — SR the static background once per scene, composite the moving subject per "
      + "frame. Slowest (buffered) path; needs a roughly static camera + a human subject. "
      + "Matte: RVM, CC BY-NC-SA (non-commercial).";
  setStatus(`Processing in <b>${selectedMode}</b> mode` + modeNote);

  // Live progress: poll while the (blocking) POST runs.
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(pollProgress, 400);

  const fd = new FormData();
  fd.append("mode", selectedMode);
  fd.append("source", $("source").value);
  fd.append("smooth", $("smooth2x").checked);   // smooth-2x interpolation (instant only)
  const f = $("file").files[0];
  if (f) fd.append("file", f);

  try {
    const r = await fetch("/api/process", { method: "POST", body: fd });
    clearInterval(pollTimer); pollTimer = null;
    await pollProgress();
    if (!r.ok) {
      const txt = await r.text();
      setStatus("Error: " + txt, true);
      btn.disabled = false;
      return;
    }
    const data = await r.json();
    $("bar").parentElement.classList.remove("indet");
    $("bar").style.width = "100%"; $("pct").textContent = "100%";
    const s = data.stats || {};

    $("playerPanel").style.display = "";
    const v = $("player");
    v.src = data.url;
    v.load();
    playResult(v);                   // play with sound, or muted-with-unmute if autoplay is blocked

    let statsText = "";
    if (s.auto_requested) {                  // Auto → <chosen>: <why>
      statsText += `auto         : → ${s.auto_chosen} — ${s.auto_reason}\n`;
    }
    statsText +=
      `source       : ${data.source}\n` +
      `mode         : ${s.label || s.mode}\n` +
      `frames       : ${s.n_frames} @ ${Number(s.fps).toFixed(2)} fps (${s.n_chunks} chunks, cap ${s.soft_cap})\n` +
      `resolution   : ${s.src_resolution} -> ${s.out_resolution} (x${s.scale})\n` +
      `audio        : ${s.audio}\n`;
    if (s.mode === "layered") {
      statsText +=
        `scenes       : ${s.n_scenes} (${s.n_fallback} moving -> region-aware fallback), plate sample cap ${s.plate_sample_cap}\n` +
        `server time  : ${s.t_total_s}s total (plate SR ${s.t_sr_s}s, build ${s.t_passA_plate_s}s, composite ${s.t_passB_composite_s}s) = ${s.ms_per_frame} ms/frame\n` +
        `layered      : ${s.layered_note}`;
    } else {
      statsText +=
        `server time  : ${s.t_total_s}s total (sr ${s.t_sr_s}s, recon ${s.t_recon_s}s) = ${s.ms_per_frame} ms/frame`;
    }
    $("stats").textContent = statsText;
    const modeLabel = { instant: "Instant 720p", quality: "Quality QHD", layered: "Layered QHD" }[s.mode]
                      || (s.label || s.mode);
    setBadge(modeLabel + " · done", false);
    const autoPrefix = s.auto_requested ? `Auto → <b>${s.auto_chosen}</b>. ` : "";
    setStatus(`${autoPrefix}Done — ${s.out_resolution}, ${s.n_frames} frames in ${s.t_total_s}s server-side.`, "ok");
  } catch (e) {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    setStatus("Request failed: " + e, true);
  } finally {
    btn.disabled = false;
  }
};

loadSources();
</script>
</body>
</html>
